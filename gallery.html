<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #008080; /* classic Windows 98 turquoise */
    font-family: 'Press Start 2P', cursive;
    color: #000;
    text-align: center;
    padding: 20px;
  }
/*  */
  h1 {
    margin-bottom: 30px;
    color: #fff;
    text-shadow: 2px 2px #000;
  }

  .gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
  }
/*  */
  .gallery a {
    display: block;
    border: 3px inset #c0c0c0;
    transition: transform 0.2s, border-style 0.2s;
    background-color: #c0c0c0;
  }

  .gallery a:hover {
    transform: scale(1.1);
    border-style: outset;
  }

  .gallery img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    display: block;
  }

  a.back {
    display: inline-block;
    margin-top: 30px;
    padding: 10px 20px;
    border: 2px inset #c0c0c0;
    background-color: #c0c0c0;
    text-decoration: none;
    color: #000;
  }

  a.back:hover {
    border-style: outset;
    background-color: #e0e0e0;
  }
</style>
</head>
<body>
<h1>Gallery</h1>

<div class="gallery">
  <a href="https://yuuko-sh.neocities.org/images/404.png" target="_blank">
    <img src="https://yuuko-sh.neocities.org/images/404.png" alt="404">
  </a>
  <a href="https://yuuko-sh.neocities.org/images/98.png" target="_blank">
    <img src="https://yuuko-sh.neocities.org/images/98.png" alt="98">
  </a>
  <a href="https://yuuko-sh.neocities.org/images/hintergrund.jpg" target="_blank">
    <img src="https://yuuko-sh.neocities.org/images/hintergrund.jpg" alt="Hintergrund">
  </a>
  <a href="https://yuuko-sh.neocities.org/images/starlancer.png" target="_blank">
    <img src="https://yuuko-sh.neocities.org/images/starlancer.png" alt="Starlancer">
  </a>
</div>

<a href="index.html" class="back">Back</a>
</body>
</html>

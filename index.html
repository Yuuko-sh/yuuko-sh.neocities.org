<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuuko.sh🐉☢</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  /* Basic Reset */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Press Start 2P', cursive;
  }

  body {
    background: url('https://yuuko-sh.neocities.org/images/wallpaper.png') no-repeat center center fixed;
    background-size: cover;
    color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* Windows 98 Window */
  .window {
    width: 300px;
    border: 2px solid #fff;
    box-shadow: 4px 4px 0 #000;
    background: #c0c0c0;
  }

  .title-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, #00008b, #0000cd);
    color: #fff;
    padding: 5px 10px;
    font-size: 0.8em;
    user-select: none;
  }

  .title-bar .controls {
    display: flex;
    gap: 5px;
  }

  .controls .close {
    width: 16px;
    height: 16px;
    background: #ff0000;
    border: 1px solid #000;
    cursor: pointer;
  }

  .content {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #c0c0c0;
  }

  .nav-btn {
    display: block;
    padding: 8px;
    background: #fff;
    border: 2px inset #808080;
    color: #000;
    text-decoration: none;
    text-align: center;
    transition: 0.2s;
  }

  .nav-btn:hover {
    border-style: outset;
    background: #e0e0e0;
  }

</style>
</head>
<body>
<div class="window">
  <div class="title-bar">
    <div class="title">yuuko.sh🐉☢</div>
    <div class="controls">
      <div class="close" onclick="this.parentElement.parentElement.style.display='none'"></div>
    </div>
  </div>
  <div class="content">
    <a href="gallery.html" class="nav-btn">Gallery</a>
    <a href="https://www.twitch.tv/yuuko_sh" class="nav-btn" target="_blank">Twitch</a>
    <a href="https://www.youtube.com/channel/UCewJzLOVYFtCrCKfEOlJhNA" class="nav-btn" target="_blank">Youtube</a>
    <a href="https://github.com/yuuko-sh" class="nav-btn" target="_blank">Github</a>
  </div>
</div>
</body>
</html>
